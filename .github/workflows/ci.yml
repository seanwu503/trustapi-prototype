name: CI

on:
  push:
  pull_request:

jobs:
  node-api:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Trust_API

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Trust_API/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm test
